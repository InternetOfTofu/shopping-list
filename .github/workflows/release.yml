name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1.16

      - name: Install cross-compiler (linux arm64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip
        run: strip target/${{ matrix.target }}/release/shopping-list

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf shopping-list-${{ matrix.suffix }}.tar.gz shopping-list

      - uses: softprops/action-gh-release@v2
        with:
          files: target/${{ matrix.target }}/release/shopping-list-${{ matrix.suffix }}.tar.gz
          generate_release_notes: true
