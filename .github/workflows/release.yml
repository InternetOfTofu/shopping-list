name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            suffix: linux-amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            suffix: linux-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract tag version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Enforce version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          if [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($VERSION)"
            exit 1
          fi

      - uses: actions-rust-lang/setup-rust-toolchain@v1.16

      - name: Install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Add musl target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip
        run: strip target/${{ matrix.target }}/release/shopping-list

      - name: Rename binary
        run: |
          mv target/${{ matrix.target }}/release/shopping-list \
             shopping-list-$VERSION-${{ matrix.suffix }}

      - uses: softprops/action-gh-release@v2
        with:
          files: shopping-list-${{ env.VERSION }}-${{ matrix.suffix }}
          generate_release_notes: true
